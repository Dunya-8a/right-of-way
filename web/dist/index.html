<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Right of Way — Orbital Negotiation</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #050510; }
    body { font-family: 'Courier New', Courier, monospace; color: #fff; }

    /* Stacking: canvas (0) < 3D labels (1) < header/panels (10) < captions (50)
       < outcome card (100). CSS2D labels get inline z-indexes from three.js,
       but those only compete INSIDE #label-root — panels always win. */
    #canvas { display: block; position: absolute; top: 0; left: 0; }
    #label-root { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }

    /* ── Header ──────────────────────────────────────────────────────────── */
    #header {
      position: absolute; top: 0; left: 0; right: 0;
      padding: 16px 28px 22px;
      background: linear-gradient(to bottom, rgba(5,5,16,0.97) 60%, transparent);
      display: flex; justify-content: space-between; align-items: flex-start;
      pointer-events: none;
      z-index: 10;
    }
    #title {
      font-size: 28px; letter-spacing: 0.28em;
      color: #00d4ff; text-shadow: 0 0 18px #00d4ffaa;
    }
    #subtitle {
      font-size: 12px; letter-spacing: 0.15em;
      color: rgba(0,212,255,0.5); margin-top: 4px;
    }
    #drop-hint {
      font-size: 11px; letter-spacing: 0.12em;
      color: rgba(255,255,255,0.28); align-self: center;
    }

    /* ── Phase badge ─────────────────────────────────────────────────────── */
    #phase-badge {
      position: absolute; top: 82px; left: 28px;
      z-index: 10;
      padding: 10px 20px;
      background: rgba(5,5,16,0.9);
      border: 1px solid rgba(0,255,136,0.4);
      border-radius: 4px;
      display: flex; align-items: center; gap: 12px;
      transition: border-color 0.3s;
    }
    #phase-dot {
      width: 13px; height: 13px; border-radius: 50%;
      background: #00ff88; box-shadow: 0 0 12px #00ff88;
      flex-shrink: 0; transition: background 0.3s, box-shadow 0.3s;
    }
    #phase-text {
      font-size: 15px; letter-spacing: 0.14em; color: #00ff88;
      transition: color 0.3s;
    }
    #phase-badge.danger { border-color: rgba(255,32,32,0.55); }
    #phase-badge.danger #phase-dot { background: #ff2020; box-shadow: 0 0 12px #ff2020; }
    #phase-badge.danger #phase-text { color: #ff5050; }

    /* ── Comms panel — the A2A negotiation channel ───────────────────────── */
    #log-panel {
      position: absolute; top: 82px; right: 28px;
      z-index: 10;
      width: 420px;
      background: rgba(5,5,16,0.9);
      border: 1px solid rgba(0,212,255,0.22);
      border-radius: 4px;
      display: flex; flex-direction: column;
      max-height: calc(100vh - 170px);
    }
    #log-header {
      padding: 8px 14px; font-size: 11px; letter-spacing: 0.2em;
      color: rgba(0,212,255,0.5);
      border-bottom: 1px solid rgba(0,212,255,0.15);
      flex-shrink: 0;
      display: flex; align-items: center; gap: 8px;
    }
    #log-header::before {
      content: ''; width: 7px; height: 7px; border-radius: 50%;
      background: #00d4ff; box-shadow: 0 0 8px #00d4ff;
      animation: comms-pulse 2.2s ease-in-out infinite;
    }
    @keyframes comms-pulse { 0%,100% { opacity: .35 } 50% { opacity: 1 } }
    #event-log {
      padding: 10px; overflow-y: auto; flex: 1;
      display: flex; flex-direction: column; gap: 8px;
    }
    #event-log::-webkit-scrollbar { width: 4px; }
    #event-log::-webkit-scrollbar-track { background: transparent; }
    #event-log::-webkit-scrollbar-thumb { background: rgba(0,212,255,0.25); border-radius: 2px; }

    /* system lines: detections, burns, verdicts — centered dividers */
    .log-entry {
      font-size: 11px; padding: 4px 10px;
      line-height: 1.5; letter-spacing: 0.08em;
      text-align: center; align-self: center;
      max-width: 100%;
    }
    .log-entry.safe    { color: #66ffb0; }
    .log-entry.danger  { color: #ff7070; }
    .log-entry.proposal{ color: #ffcc66; }
    .log-entry.maneuver{ color: #ffa060; }
    .log-entry.info    { color: rgba(255,255,255,0.4); }
    /* ?clean — recording mode: just the globe, the comms, and the captions */
    body.clean #live-sats-panel,
    body.clean #drop-hint,
    body.clean #controls { display: none; }
    body.clean #caption { bottom: 64px; }

    .log-entry.referee {
      color: #cfeaff;
      border: 1px dashed rgba(159,216,255,0.45);
      border-radius: 4px;
      background: rgba(159,216,255,0.06);
      padding: 6px 12px;
    }

    /* comms bubbles: one satellite speaking to another */
    .comms-bubble {
      max-width: 88%;
      padding: 8px 12px 9px;
      border-radius: 8px;
      background: rgba(12,26,44,0.92);
      border: 1px solid rgba(255,255,255,0.09);
      border-left: 2px solid var(--sat-color, #00d4ff);
      animation: bubble-in 0.35s cubic-bezier(0.16,1,0.3,1) both;
    }
    .comms-bubble.right {
      align-self: flex-end;
      border-left: 1px solid rgba(255,255,255,0.09);
      border-right: 2px solid var(--sat-color, #00d4ff);
    }
    @keyframes bubble-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: none; }
    }
    @media (prefers-reduced-motion: reduce) {
      .comms-bubble { animation: none; }
    }
    .comms-route {
      font-size: 10px; letter-spacing: 0.14em;
      margin-bottom: 4px;
      display: flex; align-items: baseline; gap: 6px; flex-wrap: wrap;
    }
    .comms-from { color: var(--sat-color, #00d4ff); font-weight: bold; }
    .comms-to   { color: rgba(255,255,255,0.4); }
    .comms-kind {
      margin-left: auto;
      font-size: 9px; letter-spacing: 0.12em;
      padding: 1px 6px; border-radius: 3px;
      border: 1px solid currentColor;
    }
    .comms-kind.k-cannot  { color: #ff6b6b; }
    .comms-kind.k-assert  { color: #58c7ff; }
    .comms-kind.k-concede { color: #ffb03a; }
    .comms-kind.k-propose { color: #ffcc66; }
    .comms-kind.k-accept  { color: #3ddc97; }
    .comms-kind.k-directive { color: #9fb4c7; }
    .comms-text {
      font-size: 11.5px; line-height: 1.55;
      color: rgba(228,240,250,0.88);
      letter-spacing: 0.01em;
    }
    .comms-rounds {
      margin-top: 5px;
      font-size: 9px; letter-spacing: 0.14em;
      color: rgba(255,255,255,0.35);
    }

    /* ── Story captions — cinematic lower-third ──────────────────────────── */
    #caption {
      /* centered in the space LEFT of the comms panel (420px + margins) so
         captions never run under the negotiation */
      position: absolute; left: calc((100vw - 476px) / 2); bottom: 110px;
      transform: translateX(-50%) translateY(10px);
      text-align: center; pointer-events: none;
      opacity: 0; transition: opacity 0.4s ease, transform 0.4s ease;
      max-width: min(640px, calc(100vw - 520px));
      z-index: 50;
    }
    #caption.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
    #caption-headline {
      font-size: 21px; letter-spacing: 0.3em; font-weight: bold;
      color: var(--cap-color, #00d4ff);
      text-shadow: 0 0 18px var(--cap-glow, rgba(0,212,255,0.55)),
                   0 2px 10px rgba(0,0,0,0.9);
      margin-bottom: 6px;
    }
    #caption-sub {
      font-size: 12.5px; letter-spacing: 0.08em; line-height: 1.6;
      color: rgba(230,242,252,0.85);
      text-shadow: 0 1px 8px rgba(0,0,0,0.95);
    }

    /* ── Bottom controls ─────────────────────────────────────────────────── */
    #controls {
      position: absolute; bottom: 0; left: 0; right: 0;
      z-index: 10;
      padding: 16px 28px 20px;
      background: linear-gradient(to top, rgba(5,5,16,0.97) 60%, transparent);
      display: flex; align-items: center; gap: 16px;
    }
    #play-btn {
      background: none;
      border: 1px solid #00d4ff;
      color: #00d4ff;
      font-size: 20px; line-height: 1;
      width: 46px; height: 46px;
      cursor: pointer; border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background 0.15s;
    }
    #play-btn:hover { background: rgba(0,212,255,0.14); }

    /* Scrubber wrapper holds the range input + event tick marks */
    #scrubber-wrap {
      flex: 1; position: relative;
      display: flex; align-items: center;
      height: 24px;
    }
    #scrubber {
      width: 100%; -webkit-appearance: none;
      height: 3px; background: rgba(0,212,255,0.18);
      border-radius: 2px; outline: none; cursor: pointer;
      position: relative; z-index: 2;
    }
    #scrubber::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      background: #00d4ff; border-radius: 50%;
      box-shadow: 0 0 8px #00d4ff;
      position: relative; z-index: 3;
    }
    /* Event tick marks overlay */
    #event-marks {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none; z-index: 1;
    }
    .ev-mark {
      position: absolute; top: 50%;
      width: 8px; height: 8px; border-radius: 50%;
      transform: translate(-50%, -50%);
      opacity: 0.85;
    }
    .ev-mark.danger   { background: #ff2020; box-shadow: 0 0 5px #ff2020; }
    .ev-mark.proposal { background: #ffaa00; box-shadow: 0 0 5px #ffaa00; }
    .ev-mark.maneuver { background: #ff6600; box-shadow: 0 0 5px #ff6600; }
    .ev-mark.safe     { background: #00ff88; box-shadow: 0 0 5px #00ff88; }

    #time-display {
      font-size: 14px; color: #00d4ff;
      letter-spacing: 0.08em; min-width: 80px; text-align: right;
    }
    #speed-select {
      background: rgba(0,15,30,0.9);
      border: 1px solid rgba(0,212,255,0.35);
      color: #00d4ff; padding: 6px 10px;
      font-family: inherit; font-size: 13px;
      cursor: pointer; border-radius: 4px; flex-shrink: 0;
    }
    #story-btn {
      background: none;
      border: 1px solid rgba(159,216,255,0.35);
      color: rgba(159,216,255,0.45); padding: 6px 12px;
      font-family: inherit; font-size: 12px; letter-spacing: 0.1em;
      cursor: pointer; border-radius: 4px; flex-shrink: 0;
      transition: all 0.15s;
    }
    #story-btn.on {
      border-color: rgba(159,216,255,0.8);
      color: #9fd8ff;
      box-shadow: 0 0 10px rgba(159,216,255,0.25);
    }
    #live-btn {
      background: none;
      border: 1px solid rgba(0,255,136,0.5);
      color: #00ff88; padding: 6px 12px;
      font-family: inherit; font-size: 12px; letter-spacing: 0.1em;
      cursor: pointer; border-radius: 4px; flex-shrink: 0;
      transition: background 0.15s;
    }
    #live-btn:hover { background: rgba(0,255,136,0.12); }
    #run-btn {
      background: none;
      border: 1px solid rgba(255,170,0,0.6);
      color: #ffaa00; padding: 6px 14px;
      font-family: inherit; font-size: 12px; letter-spacing: 0.1em;
      cursor: pointer; border-radius: 4px; flex-shrink: 0;
      transition: background 0.15s, opacity 0.15s;
    }
    #run-btn:hover:not(:disabled) { background: rgba(255,170,0,0.12); }
    #run-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    #earth-status {
      font-size: 10px; letter-spacing: 0.08em;
      color: rgba(0,255,136,0.6); min-width: 120px;
      flex-shrink: 0;
    }

    /* ── Outcome card ────────────────────────────────────────────────────── */
    #outcome-card {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(5,5,16,0.72);
      opacity: 0; pointer-events: none;
      transition: opacity 0.5s ease;
      z-index: 100;
    }
    #outcome-card.visible {
      opacity: 1; pointer-events: all;
    }
    #outcome-inner {
      background: rgba(5,5,16,0.97);
      border: 1px solid rgba(0,255,136,0.4);
      border-radius: 6px;
      padding: 36px 48px;
      min-width: 420px;
      transform: translateY(24px);
      transition: transform 0.45s cubic-bezier(0.16,1,0.3,1);
      text-align: center;
    }
    #outcome-card.visible #outcome-inner { transform: translateY(0); }
    #outcome-card.failed #outcome-inner { border-color: rgba(255,32,32,0.4); }

    #outcome-headline {
      font-size: 32px; letter-spacing: 0.3em;
      color: #00ff88; text-shadow: 0 0 24px #00ff8888;
      margin-bottom: 6px;
    }
    #outcome-card.failed #outcome-headline { color: #ff4040; text-shadow: 0 0 24px #ff202088; }
    #outcome-scenario {
      font-size: 11px; letter-spacing: 0.18em;
      color: rgba(255,255,255,0.35); margin-bottom: 32px;
    }
    #outcome-stats {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 20px 32px; margin-bottom: 32px;
    }
    .stat-block { display: flex; flex-direction: column; gap: 4px; }
    .stat-value {
      font-size: 26px; letter-spacing: 0.06em; color: #fff;
      text-shadow: 0 0 12px rgba(255,255,255,0.2);
    }
    .stat-label {
      font-size: 10px; letter-spacing: 0.18em;
      color: rgba(0,212,255,0.55);
    }
    #outcome-dismiss {
      background: none;
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.45);
      font-family: inherit; font-size: 11px; letter-spacing: 0.15em;
      padding: 8px 24px; cursor: pointer; border-radius: 3px;
      transition: all 0.15s;
    }
    #outcome-dismiss:hover {
      border-color: rgba(255,255,255,0.5);
      color: rgba(255,255,255,0.85);
    }

    /* ── Live satellite panel ────────────────────────────────────────────── */
    #live-sats-panel {
      position: absolute; top: 148px; left: 28px;
      z-index: 10;
      background: rgba(5,5,16,0.9);
      border: 1px solid rgba(0,212,255,0.22);
      border-radius: 4px;
      padding: 8px 10px;
      display: flex; flex-direction: column; gap: 6px;
    }
    #live-sats-header {
      font-size: 10px; letter-spacing: 0.2em;
      color: rgba(0,212,255,0.5); margin-bottom: 2px;
    }
    .sat-group-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.45);
      font-family: inherit; font-size: 11px; letter-spacing: 0.1em;
      padding: 5px 10px; cursor: pointer; border-radius: 3px;
      display: flex; justify-content: space-between; align-items: center;
      gap: 14px; transition: all 0.15s; text-align: left;
    }
    .sat-group-btn .btn-count {
      font-size: 10px; opacity: 0.6;
    }
    .sat-group-btn:hover { border-color: rgba(255,255,255,0.4); color: rgba(255,255,255,0.7); }
    .sat-group-btn.active { border-color: currentColor; color: var(--group-color); }
    .sat-group-btn.loading { opacity: 0.5; pointer-events: none; }

    /* ── CSS2D labels (projector-sized) ─────────────────────────────────── */
    .live-label {
      color: rgba(255,255,255,0.7);
      font-family: 'Courier New', monospace;
      font-size: 11px; letter-spacing: 0.06em;
      text-shadow: 0 0 6px rgba(255,255,255,0.5);
      white-space: nowrap; pointer-events: none;
    }
    .live-label-picked {
      color: #fff;
      font-family: 'Courier New', monospace;
      font-size: 13px; font-weight: bold; letter-spacing: 0.08em;
      text-shadow: 0 0 10px rgba(255,255,255,0.9), 0 0 20px rgba(255,255,255,0.4);
      white-space: nowrap; pointer-events: none;
      padding: 3px 7px;
      background: rgba(5,5,16,0.75);
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 3px;
    }
    .sat-label {
      color: rgba(0,212,255,0.85);
      font-family: 'Courier New', monospace;
      font-size: 13px; letter-spacing: 0.07em;
      text-shadow: 0 0 7px rgba(0,212,255,0.9);
      white-space: nowrap; pointer-events: none;
    }
    .conj-label {
      color: #ff4040;
      font-family: 'Courier New', monospace;
      font-size: 18px; font-weight: bold; letter-spacing: 0.1em;
      text-shadow: 0 0 12px #ff2020, 0 0 28px #ff202055;
      white-space: nowrap; pointer-events: none;
    }
    .resolved-label {
      color: #00ff88;
      font-family: 'Courier New', monospace;
      font-size: 16px; font-weight: bold;
      text-shadow: 0 0 10px #00ff88, 0 0 24px #00ff8855;
      white-space: nowrap; pointer-events: none;
    }
  </style>
  <script type="module" crossorigin src="/assets/index-DnhZlz14.js"></script>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="label-root"></div>

  <div id="outcome-card">
    <div id="outcome-inner">
      <div id="outcome-headline">RESOLVED</div>
      <div id="outcome-scenario"></div>
      <div id="outcome-stats">
        <div class="stat-block">
          <div class="stat-value" id="stat-dv">—</div>
          <div class="stat-label">TOTAL Δv (m/s)</div>
        </div>
        <div class="stat-block">
          <div class="stat-value" id="stat-conjunctions">—</div>
          <div class="stat-label">CONJUNCTIONS</div>
        </div>
        <div class="stat-block">
          <div class="stat-value" id="stat-maneuvers">—</div>
          <div class="stat-label">MANEUVERS</div>
        </div>
        <div class="stat-block">
          <div class="stat-value" id="stat-rounds">—</div>
          <div class="stat-label">NEG. ROUNDS</div>
        </div>
        <div class="stat-block">
          <div class="stat-value" id="stat-time">—</div>
          <div class="stat-label">TIME TO CLEAR (s)</div>
        </div>
        <div class="stat-block">
          <div class="stat-value" id="stat-topology">—</div>
          <div class="stat-label">TOPOLOGY</div>
        </div>
      </div>
      <button id="outcome-dismiss">DISMISS</button>
    </div>
  </div>

  <div id="header">
    <div>
      <div id="title">RIGHT OF WAY</div>
      <div id="subtitle">Satellites negotiating their own collision avoidance — no one in charge</div>
    </div>
    <div id="drop-hint">DROP TIMELINE JSON TO REPLACE FIXTURE</div>
  </div>

  <div id="phase-badge">
    <div id="phase-dot"></div>
    <div id="phase-text">ALL CLEAR</div>
  </div>

  <div id="live-sats-panel">
    <div id="live-sats-header">SCENE LAYERS</div>
    <button class="sat-group-btn active" id="sim-toggle" style="--group-color:#00d4ff">SIMULATION <span class="btn-count"></span></button>
    <div style="height:1px;background:rgba(0,212,255,0.15);margin:2px 0"></div>
    <button class="sat-group-btn" data-group="stations" style="--group-color:#ffffff">STATIONS   <span class="btn-count"></span></button>
    <button class="sat-group-btn" data-group="starlink" style="--group-color:#5599ff">STARLINK   <span class="btn-count"></span></button>
    <button class="sat-group-btn" data-group="active"   style="--group-color:#7799aa">ALL ACTIVE <span class="btn-count"></span></button>
  </div>

  <div id="log-panel">
    <div id="log-header">SATELLITE COMMS — A2A CHANNEL</div>
    <div id="event-log"></div>
  </div>

  <div id="caption">
    <div id="caption-headline"></div>
    <div id="caption-sub"></div>
  </div>

  <div id="controls">
    <button id="play-btn">▶</button>
    <div id="scrubber-wrap">
      <div id="event-marks"></div>
      <input type="range" id="scrubber" min="0" max="1000" value="0" step="1" />
    </div>
    <div id="time-display">T+00:00</div>
    <button id="story-btn" class="on" title="Pause the orbits while each negotiation beat plays out">✦ STORY</button>
    <select id="speed-select">
      <option value="1">1×</option>
      <option value="5">5×</option>
      <option value="10">10×</option>
      <option value="30" selected>30×</option>
      <option value="60">60×</option>
    </select>
    <button id="run-btn">▶ RUN</button>
    <button id="live-btn">🛰 LIVE</button>
    <span id="earth-status"></span>
  </div>

</body>
</html>
